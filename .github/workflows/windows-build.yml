name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Find Release folder
        id: find_release
        shell: pwsh
        run: |
          $release = Get-ChildItem -Path "build/windows" -Recurse -Filter "Release" -Directory | Select-Object -First 1
          Write-Host "Release folder: $($release.FullName)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: calendar-windows
          path: build/windows/x64/runner/Release/
          retention-days: 7
